gatling {
  core {
    outputDirectoryBaseName = "gatling-load-java"
    runDescription = "Reqres API Performance Testing"
    encoding = "utf-8"

    simulationClass = ""
  }

  charting {
    indicators {
      lowerBound = 500
      higherBound = 2000
      percentile1 = 50
      percentile2 = 75
      percentile3 = 95
      percentile4 = 99
    }
  }

  http {
    requestTimeout = 60000
    enableGA = false
  }
}
